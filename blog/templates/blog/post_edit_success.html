{% extends '_base.html' %}
{% load static %}

{% block title %}ویرایش موفق | وبلاگ متین{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center; border-top: 5px solid #10b981;">
        <div class="auth-header">
            <h2 style="color: #10b981; font-size: 3rem; margin-bottom: 1rem;">✨</h2>
            <h3 style="margin-bottom: 1rem;">ویرایش با موفقیت انجام شد!</h3>
            <p style="color: var(--text-muted); line-height: 1.8;">
                تغییراتی که روی مقاله <strong>"{{ post.title }}"</strong> اعمال کردی، با موفقیت تو دیتابیس ذخیره شد.
            </p>
        </div>
        
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
            <a href="{{ post.get_absolute_url }}" class="btn btn-primary btn-block">مشاهده مقاله ویرایش شده</a>
            <a href="{% url 'posts_list' %}" class="btn btn-outline btn-block" style="text-align: center;">رفتن به لیست مقالات</a>
        </div>
    </div>
</div>
{% endblock %}
