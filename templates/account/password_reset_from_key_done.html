{% extends "_base.html" %}
{% load i18n %}

{% block title %}رمز عبور تغییر کرد | وبلاگ متین{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center; border-top: 5px solid #10b981;">
        <div class="auth-header">
            <div style="font-size: 4rem; margin-bottom: 1.5rem;">✅</div>
            <h2 style="color: var(--text-main);">تغییر رمز موفقیت‌آمیز بود!</h2>
            <p style="color: var(--text-muted); line-height: 2; margin-top: 1rem; font-size: 0.95rem;">
                رمز عبور جدیدت با موفقیت ثبت شد. <br>
                حالا می‌تونی با خیال راحت و با رمز جدید وارد حساب کاربریت بشی.
            </p>
        </div>
        
        <div style="margin-top: 2.5rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
            <a href="{% url 'account_login' %}" class="btn btn-primary btn-block">ورود به حساب کاربری 🚀</a>
        </div>
    </div>
</div>
{% endblock %}
